<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Futures Abroad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0F0A1E;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(108, 60, 225, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 212, 170, 0.1) 0%, transparent 60%);
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6C3CE1 0%, #00D4AA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6C3CE1;
            box-shadow: 0 0 0 3px rgba(108, 60, 225, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6C3CE1 0%, #00D4AA 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 60, 225, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #FF6B6B;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(0, 212, 170, 0.15);
            border: 1px solid rgba(0, 212, 170, 0.3);
            color: #00D4AA;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .signup-link a {
            color: #6C3CE1;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #8B6BF0;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== DEMO CREDENTIALS ===== */
        .demo-credentials {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .demo-credentials p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-bottom: 4px;
        }

        .demo-credentials code {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin: 2px 0;
        }

        .demo-credentials .demo-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.6);
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            margin-top: 6px;
        }

        .demo-credentials .demo-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🚀 Futures Abroad</div>
        <p class="subtitle">Welcome back! Login to continue your university journey</p>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message">
            ❌ Invalid email or password. Please try again.
        </div>

        <!-- Success Message -->
        <div id="successMessage" class="success-message">
            ✅ Login successful! Redirecting to dashboard...
        </div>

        <!-- Demo Credentials -->
        <div class="demo-credentials">
            <p>🔑 Demo Account (Firebase)</p>
            <code>Email: demo@futuresabroad.com</code>
            <br />
            <code>Password: password123</code>
            <br />
            <button class="demo-btn" onclick="fillDemoCredentials()">📝 Fill Demo Credentials</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email" 
                    required
                    value="demo@futuresabroad.com"
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter your password" 
                    required
                    value="password123"
                />
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                🔐 Login
            </button>
        </form>

        <div class="signup-link">
            New to Futures Abroad? <a href="signup.html">Create Your Account →</a>
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT - Firebase Authentication
    ============================================================ -->
    <script type="module">
        // Import Firebase Auth
        import { 
            auth, 
            signInWithEmailAndPassword,
            onAuthStateChanged,
            db,
            doc,
            getDoc,
            COLLECTIONS
        } from './js/firebase-config.js';

        console.log('🚀 Login page loaded with Firebase!');

        // DOM Elements
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loginForm = document.getElementById('loginForm');

        // ============================================================
        // FILL DEMO CREDENTIALS
        // ============================================================
        window.fillDemoCredentials = function() {
            emailInput.value = 'demo@futuresabroad.com';
            passwordInput.value = 'password123';
        };

        // ============================================================
        // HANDLE LOGIN WITH FIREBASE
        // ============================================================
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            // Hide previous messages
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // Validate inputs
            if (!email || !password) {
                errorMessage.textContent = '❌ Please enter both email and password.';
                errorMessage.classList.add('show');
                return;
            }

            // Show loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';

            try {
                // 🔐 Sign in with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                console.log('✅ Login successful for:', user.email);
                console.log('🆔 User UID:', user.uid);

                // ✅ Get user data from Firestore
                try {
                    const userRef = doc(db, COLLECTIONS.users, user.uid);
                    const userDoc = await getDoc(userRef);
                    
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        console.log('📦 User data from Firestore:', userData);
                        
                        // Save to localStorage for quick access
                        localStorage.setItem('futuresAbroadUser', JSON.stringify({
                            uid: user.uid,
                            email: user.email,
                            name: userData.name || user.email?.split('@')[0] || 'Student',
                            grade: userData.grade || 10,
                            interests: userData.interests || ['STEM', 'Leadership'],
                            school: userData.school || '',
                            country: userData.country || '',
                            loggedIn: true,
                            loginTime: new Date().toISOString()
                        }));
                    } else {
                        // User exists in Auth but not in Firestore yet
                        console.log('⚠️ User found in Auth but not in Firestore. Creating profile...');
                        
                        // Create basic profile
                        const userData = {
                            uid: user.uid,
                            email: user.email,
                            name: user.email?.split('@')[0] || 'Student',
                            grade: 10,
                            interests: ['STEM', 'Leadership'],
                            school: '',
                            country: '',
                            createdAt: new Date().toISOString()
                        };
                        
                        await setDoc(userRef, userData);
                        
                        localStorage.setItem('futuresAbroadUser', JSON.stringify({
                            uid: user.uid,
                            email: user.email,
                            name: userData.name,
                            grade: userData.grade,
                            interests: userData.interests,
                            school: userData.school,
                            country: userData.country,
                            loggedIn: true,
                            loginTime: new Date().toISOString()
                        }));
                    }
                } catch (firestoreError) {
                    console.warn('⚠️ Could not fetch Firestore data:', firestoreError);
                    // Still allow login, use basic data
                    localStorage.setItem('futuresAbroadUser', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        name: user.email?.split('@')[0] || 'Student',
                        grade: 10,
                        interests: ['STEM', 'Leadership'],
                        loggedIn: true,
                        loginTime: new Date().toISOString()
                    }));
                }

                // Show success message
                successMessage.textContent = '✅ Login successful! Redirecting to dashboard...';
                successMessage.classList.add('show');

                // Reset button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '✅ Logged In!';

                // 🚀 Redirect to student app
                setTimeout(() => {
                    window.location.href = 'student-app.html';
                }, 1200);

            } catch (error) {
                // ❌ Login failed
                console.error('❌ Login error:', error.code, error.message);
                
                let errorMsg = '❌ Invalid email or password. Please try again.';
                
                // Better error messages
                if (error.code === 'auth/user-not-found') {
                    errorMsg = '❌ No account found with this email. Please sign up first.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMsg = '❌ Incorrect password. Please try again.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg = '❌ Too many failed attempts. Please try again later.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = '❌ Invalid email format. Please check your email.';
                } else if (error.code === 'auth/user-disabled') {
                    errorMsg = '❌ This account has been disabled. Please contact support.';
                }
                
                errorMessage.textContent = errorMsg;
                errorMessage.classList.add('show');

                // Reset button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '🔐 Login';
            }
        }

        // ============================================================
        // CHECK IF USER IS ALREADY LOGGED IN
        // ============================================================
        function checkExistingSession() {
            // Check localStorage first
            const userData = localStorage.getItem('futuresAbroadUser');
            if (userData) {
                try {
                    const user = JSON.parse(userData);
                    if (user.loggedIn) {
                        console.log('🔵 User already logged in (localStorage), redirecting...');
                        window.location.href = 'student-app.html';
                        return true;
                    }
                } catch (e) {
                    console.log('Invalid user data, clearing...');
                    localStorage.removeItem('futuresAbroadUser');
                }
            }
            return false;
        }

        // ============================================================
        // INITIALIZE
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            if (checkExistingSession()) {
                return;
            }

            // Check Firebase Auth state
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    console.log('🔵 User already logged in (Firebase):', user.email);
                    // Check if we have user data in localStorage
                    const localUser = localStorage.getItem('futuresAbroadUser');
                    if (!localUser) {
                        // Fetch user data and redirect
                        const userRef = doc(db, COLLECTIONS.users, user.uid);
                        getDoc(userRef).then((docSnap) => {
                            if (docSnap.exists()) {
                                const userData = docSnap.data();
                                localStorage.setItem('futuresAbroadUser', JSON.stringify({
                                    uid: user.uid,
                                    email: user.email,
                                    name: userData.name || user.email?.split('@')[0] || 'Student',
                                    grade: userData.grade || 10,
                                    interests: userData.interests || ['STEM', 'Leadership'],
                                    school: userData.school || '',
                                    country: userData.country || '',
                                    loggedIn: true,
                                    loginTime: new Date().toISOString()
                                }));
                            }
                            window.location.href = 'student-app.html';
                        }).catch(() => {
                            window.location.href = 'student-app.html';
                        });
                    } else {
                        window.location.href = 'student-app.html';
                    }
                }
            });

            // Auto-fill demo credentials
            emailInput.value = 'demo@futuresabroad.com';
            passwordInput.value = 'password123';
        });

        // Attach login handler to window so inline onsubmit works
        window.handleLogin = handleLogin;

        console.log('✅ Login page ready with Firebase!');
    </script>
</body>
</html>
