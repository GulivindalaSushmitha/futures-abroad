<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Futures Abroad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0F0A1E;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(108, 60, 225, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 212, 170, 0.1) 0%, transparent 60%);
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6C3CE1 0%, #00D4AA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6C3CE1;
            box-shadow: 0 0 0 3px rgba(108, 60, 225, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6C3CE1 0%, #00D4AA 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 60, 225, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #FF6B6B;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(0, 212, 170, 0.15);
            border: 1px solid rgba(0, 212, 170, 0.3);
            color: #00D4AA;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .signup-link a {
            color: #6C3CE1;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #8B6BF0;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-container { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🚀 Futures Abroad</div>
        <p class="subtitle">Welcome back! Login to continue your university journey</p>

        <div id="errorMessage" class="error-message">❌ Invalid email or password. Please try again.</div>
        <div id="successMessage" class="success-message">✅ Login successful! Redirecting to dashboard...</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required />
            </div>
            <button type="submit" class="btn-login" id="loginBtn">🔐 Login</button>
        </form>

        <div class="signup-link">
            New to Futures Abroad? <a href="signup.html">Create Your Account →</a>
        </div>
    </div>

    <script type="module">
        // ============================================================
        // LOGIN - FIXED: No Blinking
        // ============================================================
        
        import { 
            auth, 
            signInWithEmailAndPassword,
            onAuthStateChanged,
            db,
            doc,
            getDoc,
            setDoc,
            COLLECTIONS
        } from './js/firebase-config.js';

        console.log('🚀 Login page loaded!');

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loginForm = document.getElementById('loginForm');

        // ✅ PREVENT REDIRECT LOOP - Check if already redirected
        let isRedirecting = false;

        // ============================================================
        // HANDLE LOGIN
        // ============================================================
        async function handleLogin(event) {
            event.preventDefault();
            
            if (isRedirecting) return;

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            if (!email || !password) {
                errorMessage.textContent = '❌ Please enter both email and password.';
                errorMessage.classList.add('show');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                console.log('✅ Login successful:', user.email);

                // Get user data from Firestore
                try {
                    const userRef = doc(db, COLLECTIONS.users, user.uid);
                    const userDoc = await getDoc(userRef);
                    
                    let userData = {
                        uid: user.uid,
                        email: user.email,
                        name: user.email?.split('@')[0] || 'Student',
                        grade: 10,
                        interests: ['STEM', 'Leadership'],
                        school: '',
                        country: '',
                        loggedIn: true,
                        loginTime: new Date().toISOString()
                    };
                    
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        userData = { ...userData, ...data, loggedIn: true };
                    } else {
                        await setDoc(userRef, userData);
                    }
                    
                    localStorage.setItem('futuresAbroadUser', JSON.stringify(userData));
                } catch (err) {
                    console.warn('Firestore error:', err);
                    localStorage.setItem('futuresAbroadUser', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        name: user.email?.split('@')[0] || 'Student',
                        grade: 10,
                        interests: ['STEM', 'Leadership'],
                        loggedIn: true
                    }));
                }

                successMessage.textContent = '✅ Login successful! Redirecting...';
                successMessage.classList.add('show');

                loginBtn.disabled = false;
                loginBtn.innerHTML = '✅ Logged In!';

                isRedirecting = true;
                setTimeout(() => {
                    window.location.href = 'student-app.html';
                }, 1200);

            } catch (error) {
                console.error('❌ Login error:', error.code);
                
                let msg = '❌ Invalid email or password. Please try again.';
                if (error.code === 'auth/user-not-found') {
                    msg = '❌ No account found. Please sign up first.';
                } else if (error.code === 'auth/wrong-password') {
                    msg = '❌ Incorrect password. Please try again.';
                } else if (error.code === 'auth/too-many-requests') {
                    msg = '❌ Too many failed attempts. Please try again later.';
                } else if (error.code === 'auth/invalid-email') {
                    msg = '❌ Invalid email format.';
                }
                
                errorMessage.textContent = msg;
                errorMessage.classList.add('show');

                loginBtn.disabled = false;
                loginBtn.innerHTML = '🔐 Login';
            }
        }

        // ============================================================
        // CHECK IF ALREADY LOGGED IN - WITH GUARD
        // ============================================================
        function checkExistingSession() {
            if (isRedirecting) return false;
            
            const userData = localStorage.getItem('futuresAbroadUser');
            if (userData) {
                try {
                    const user = JSON.parse(userData);
                    if (user.loggedIn) {
                        console.log('🔵 Already logged in, redirecting...');
                        isRedirecting = true;
                        window.location.href = 'student-app.html';
                        return true;
                    }
                } catch (e) {
                    localStorage.removeItem('futuresAbroadUser');
                }
            }
            return false;
        }

        // ============================================================
        // INITIALIZE - WITH GUARD
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in (with guard)
            if (checkExistingSession()) return;

            // Check Firebase auth state - WITH GUARD
            onAuthStateChanged(auth, (user) => {
                if (user && !isRedirecting) {
                    console.log('🔵 Already logged in (Firebase):', user.email);
                    isRedirecting = true;
                    window.location.href = 'student-app.html';
                }
            });
        });

        loginForm.addEventListener('submit', handleLogin);
        console.log('✅ Login page ready!');
    </script>
</body>
</html>
