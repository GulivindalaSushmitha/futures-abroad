<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Futures Abroad</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🚀 Futures Abroad</div>
                <h1>Welcome Back!</h1>
                <p>Login to continue your university journey</p>
            </div>
            <form id="login-form" class="auth-form">
                <div id="loginMessage" style="display:none; padding:10px; border-radius:10px; margin-bottom:10px;"></div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="student@email.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required />
                </div>
                <button type="submit" class="btn-submit">Login 🚀</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
                <p><a href="index.html">← Back to Home</a></p>
                <p style="margin-top:10px;"><a href="admin-login.html" style="color:#FF6B6B;">🔐 Admin Login</a></p>
            </div>
        </div>
        <div class="auth-illustration">
            <div id="login-animation"></div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const msgEl = document.getElementById('loginMessage');
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Check if admin
                const adminDoc = await db.collection('admins').doc(user.uid).get();
                if (adminDoc.exists) {
                    window.location.href = 'admin-dashboard.html';
                    return;
                }
                
                window.location.href = 'dashboard.html';
            } catch (error) {
                msgEl.style.display = 'block';
                msgEl.style.background = '#FFE8E8';
                msgEl.style.color = '#C62828';
                msgEl.textContent = '❌ Login failed: ' + error.message;
            }
        });
    </script>
</body>
</html>
