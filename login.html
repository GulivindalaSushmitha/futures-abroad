<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Futures Abroad</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .auth-container {
            max-width: 420px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(108,60,225,0.12);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header .logo {
            font-size: 28px;
            font-weight: 800;
            color: #2D1B4E;
        }
        .auth-header .logo span { color: #6C3CE1; }
        .auth-header h1 {
            font-size: 28px;
            color: #2D1B4E;
            margin: 10px 0 5px;
        }
        .auth-header p {
            color: #888;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #2D1B4E;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E8E0F0;
            border-radius: 14px;
            font-size: 15px;
            font-family: 'Quicksand', sans-serif;
            transition: border 0.3s;
            background: #faf8ff;
        }
        .form-group input:focus {
            border-color: #6C3CE1;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(108,60,225,0.08);
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Quicksand', sans-serif;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(108,60,225,0.35);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        .auth-footer a {
            color: #6C3CE1;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .message-box {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
        .message-box.error {
            display: block;
            background: #FFE8E8;
            color: #C62828;
            border-left: 4px solid #C62828;
        }
        .message-box.success {
            display: block;
            background: #E8F5E9;
            color: #2E7D32;
            border-left: 4px solid #2E7D32;
        }
        .message-box.error a {
            color: #6C3CE1;
            font-weight: 700;
        }
        .btn-app-redirect {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 24px;
            background: #6C3CE1;
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-app-redirect:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108,60,225,0.3);
        }
        .signup-cta {
            background: #f8f4ff;
            border-radius: 16px;
            padding: 16px 20px;
            margin: 16px 0;
            text-align: center;
            border: 2px solid #f0e6ff;
        }
        .signup-cta p {
            margin: 0 0 8px 0;
            color: #2D1B4E;
            font-weight: 600;
        }
        .signup-cta .btn-signup-cta {
            display: inline-block;
            padding: 10px 28px;
            background: linear-gradient(135deg, #6C3CE1, #a855f7);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s;
        }
        .signup-cta .btn-signup-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(108,60,225,0.3);
        }
        .demo-credentials {
            background: #f0f7ff;
            border-radius: 12px;
            padding: 12px 16px;
            margin: 12px 0;
            font-size: 13px;
            border: 1px dashed #6C3CE1;
        }
        .demo-credentials code {
            background: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">🚀 Futures <span>Abroad</span></div>
            <h1>Welcome Back!</h1>
            <p>Login to continue your university journey</p>
        </div>
        
        <div id="loginMessage" class="message-box"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="student@email.com" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" required />
            </div>
            <button type="submit" class="btn-submit">Login 🚀</button>
        </form>
        
        <!-- ===== SIGN UP CTA - NEW USERS ===== -->
        <div class="signup-cta">
            <p>🆕 New to Futures Abroad?</p>
            <a href="signup.html" class="btn-signup-cta">Create Your Account →</a>
        </div>
        
        <div style="text-align: center; margin-top: 12px;">
            <a href="student-app.html" class="btn-app-redirect">🚀 Go to Student App</a>
        </div>
        
        <div class="auth-footer">
            <p><a href="index.html">← Back to Home</a></p>
            <p style="margin-top:8px;"><a href="admin-login.html" style="color:#FF6B6B;">🔐 Admin Login</a></p>
        </div>
    </div>

    <script type="module">
        import { 
            auth, 
            onAuthStateChanged, 
            signInWithEmailAndPassword,
            doc,
            getDoc,
            setDoc,
            db
        } from './js/firebase-config.js';
        
        // Check if already logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Check if admin
                const adminDoc = await getDoc(doc(db, 'admins', user.uid));
                if (adminDoc.exists()) {
                    window.location.href = 'admin-dashboard.html';
                    return;
                }
                // Redirect to student-app.html
                window.location.href = 'student-app.html';
            }
        });
        
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const msgEl = document.getElementById('loginMessage');
            
            msgEl.className = 'message-box';
            msgEl.textContent = '';
            
            if (!email || !password) {
                msgEl.className = 'message-box error';
                msgEl.textContent = '⚠️ Please enter both email and password.';
                return;
            }
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Check if admin
                const adminDoc = await getDoc(doc(db, 'admins', user.uid));
                if (adminDoc.exists()) {
                    msgEl.className = 'message-box success';
                    msgEl.textContent = '🔐 Admin login successful!';
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 500);
                    return;
                }
                
                // Check student exists
                const studentDoc = await getDoc(doc(db, 'students', user.uid));
                if (!studentDoc.exists()) {
                    // Create student profile if missing
                    await setDoc(doc(db, 'students', user.uid), {
                        uid: user.uid,
                        email: email,
                        name: email.split('@')[0],
                        createdAt: new Date().toISOString()
                    });
                }
                
                msgEl.className = 'message-box success';
                msgEl.textContent = '✅ Login successful! Redirecting to Student App...';
                setTimeout(() => {
                    window.location.href = 'student-app.html';
                }, 500);
                
            } catch (error) {
                console.error('Login error:', error);
                msgEl.className = 'message-box error';
                
                // User-friendly error messages
                if (error.code === 'auth/user-not-found') {
                    msgEl.innerHTML = '❌ No account found with this email. <a href="signup.html">Create an account</a> first.';
                } else if (error.code === 'auth/wrong-password') {
                    msgEl.textContent = '❌ Incorrect password. Please try again.';
                } else if (error.code === 'auth/invalid-email') {
                    msgEl.textContent = '❌ Invalid email format. Please check your email.';
                } else if (error.code === 'auth/invalid-credential') {
                    msgEl.innerHTML = '❌ Invalid login credentials. This email may not be registered. <a href="signup.html">Create an account</a>.';
                } else if (error.code === 'auth/too-many-requests') {
                    msgEl.textContent = '❌ Too many failed attempts. Please wait a moment and try again.';
                } else {
                    msgEl.textContent = '❌ Login failed: ' + error.message;
                }
            }
        });
    </script>
</body>
</html>
