<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Futures Abroad | Your Activities</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary: #6C3CE1;
            --primary-light: #8B6BF0;
            --primary-dark: #4A1FA0;
            --secondary: #00D4AA;
            --accent: #FF6B6B;
            --gradient-primary: linear-gradient(135deg, #6C3CE1 0%, #00D4AA 100%);
            --gradient-warm: linear-gradient(135deg, #FF6B6B 0%, #FFB84D 100%);
            --bg-dark: #0F0A1E;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --shadow-glow: 0 8px 32px rgba(108, 60, 225, 0.3);
            --radius: 20px;
            --radius-sm: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .dashboard-container {
            min-height: 100vh;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(108, 60, 225, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 212, 170, 0.1) 0%, transparent 60%);
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .dashboard-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .dashboard-nav .logo {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-nav .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .dashboard-nav .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
        }

        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 50px;
            color: #FF6B6B;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.25);
            transform: translateY(-2px);
        }

        .welcome-section {
            margin-bottom: 32px;
        }

        .welcome-section h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-section p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .interest-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0 24px 0;
        }

        .interest-tag {
            padding: 6px 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            font-size: 13px;
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .interest-tag:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .interest-tag .tag-icon {
            margin-right: 6px;
        }

        .feed-header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .feed-header h2 {
            font-size: 22px;
            font-weight: 600;
        }

        .feed-header .feed-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            background: var(--glass);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-family: 'Inter', sans-serif;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--gradient-primary);
            border-color: transparent;
            color: white;
        }

        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-top: 16px;
        }

        .activity-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .activity-card:nth-child(1) { animation-delay: 0.05s; }
        .activity-card:nth-child(2) { animation-delay: 0.1s; }
        .activity-card:nth-child(3) { animation-delay: 0.15s; }
        .activity-card:nth-child(4) { animation-delay: 0.2s; }
        .activity-card:nth-child(5) { animation-delay: 0.25s; }
        .activity-card:nth-child(6) { animation-delay: 0.3s; }

        .activity-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .activity-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-glow);
            border-color: var(--primary-light);
        }

        .activity-card:hover::before {
            opacity: 1;
        }

        .activity-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .activity-badge.internship { background: rgba(74, 144, 217, 0.3); color: #4A90D9; }
        .activity-badge.competition { background: rgba(255, 107, 107, 0.3); color: #FF6B6B; }
        .activity-badge.volunteering { background: rgba(0, 212, 170, 0.3); color: #00D4AA; }
        .activity-badge.course { background: rgba(108, 60, 225, 0.3); color: #8B6BF0; }
        .activity-badge.workshop { background: rgba(255, 184, 77, 0.3); color: #FFB84D; }
        .activity-badge.summit { background: rgba(255, 107, 107, 0.3); color: #FF6B6B; }
        .activity-badge.research { background: rgba(74, 144, 217, 0.3); color: #4A90D9; }

        .activity-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .activity-card .activity-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .activity-card .activity-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .activity-rationale {
            background: rgba(108, 60, 225, 0.1);
            border-left: 3px solid var(--primary-light);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-secondary);
            margin: 12px 0;
            line-height: 1.5;
        }

        .activity-rationale .rationale-icon {
            color: var(--primary-light);
            margin-right: 6px;
        }

        .activity-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .activity-tags .mini-tag {
            padding: 2px 10px;
            background: var(--glass);
            border-radius: 50px;
            font-size: 11px;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }

        .activity-card .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border);
            flex-wrap: wrap;
            gap: 10px;
        }

        .activity-card .card-footer .deadline {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .activity-card .card-footer .deadline .urgent {
            color: var(--accent);
            font-weight: 600;
        }

        .btn-register {
            padding: 10px 28px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-register:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(108, 60, 225, 0.4);
        }

        .no-activities {
            text-align: center;
            padding: 60px 20px;
            background: var(--glass);
            border-radius: var(--radius);
            border: 2px dashed var(--glass-border);
        }

        .no-activities .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .no-activities h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .no-activities p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .btn-retake-quiz {
            padding: 12px 32px;
            background: var(--gradient-warm);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-retake-quiz:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3);
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .loading-spinner .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--primary-light);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .dashboard-nav {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
                text-align: center;
            }
            
            .dashboard-nav .user-info {
                justify-content: center;
                flex-wrap: wrap;
            }
            
            .feed-header .feed-actions {
                justify-content: center;
            }
            
            .activities-grid {
                grid-template-columns: 1fr;
            }
            
            .welcome-section h1 {
                font-size: 24px;
            }
            
            .activity-card .card-footer {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn-register {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container" id="app">
        <nav class="dashboard-nav">
            <div class="logo">🚀 Futures Abroad</div>
            <div class="user-info">
                <span id="userGrade">Grade 10</span>
                <span id="userName">Student</span>
                <div class="user-avatar" id="userAvatar">S</div>
                <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
            </div>
        </nav>

        <section class="welcome-section">
            <h1>👋 Welcome back, <span id="userNameDisplay">Student</span></h1>
            <p>Here are activities tailored to your interests. Pick one and start building your future!</p>
            <div class="interest-tags" id="interestTags"></div>
        </section>

        <div class="feed-header">
            <h2>🎯 Recommended Activities</h2>
            <div class="feed-actions">
                <button class="filter-btn active" data-filter="All Types">All Types</button>
                <button class="filter-btn" data-filter="internship">💼 Internship</button>
                <button class="filter-btn" data-filter="competition">🏆 Competition</button>
                <button class="filter-btn" data-filter="volunteering">🤝 Volunteering</button>
                <button class="filter-btn" data-filter="course">📚 Course</button>
                <button class="filter-btn" data-filter="workshop">🔧 Workshop</button>
                <button class="filter-btn" data-filter="summit">🌍 Summit</button>
            </div>
            <div class="feed-actions">
                <button class="filter-btn active" data-cost="All Costs">All Costs</button>
                <button class="filter-btn" data-cost="Free">🆓 Free</button>
                <button class="filter-btn" data-cost="Paid">💰 Paid</button>
                <button class="filter-btn" data-cost="Scholarship">🎓 Scholarship</button>
            </div>
        </div>

        <div id="activitiesContainer">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script src="js/activity-data.js"></script>
    <script type="module">
        // ============================================================
        // STUDENT APP - COMPLETE WITH FIREBASE LOGOUT
        // ============================================================
        
        import { auth, signOut } from './js/firebase-config.js';

        console.log('🚀 Dashboard loading...');

        function getUserData() {
            const userData = localStorage.getItem('futuresAbroadUser');
            if (userData) {
                try {
                    return JSON.parse(userData);
                } catch (e) {
                    console.error('Error parsing user data:', e);
                    return null;
                }
            }
            return null;
        }

        let currentUser = null;
        let currentTypeFilter = 'All Types';
        let currentCostFilter = 'All Costs';

        const activitiesContainer = document.getElementById('activitiesContainer');
        const interestTagsContainer = document.getElementById('interestTags');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const userGradeDisplay = document.getElementById('userGrade');
        const userAvatar = document.getElementById('userAvatar');
        const logoutBtn = document.getElementById('logoutBtn');

        // ============================================================
        // HANDLE LOGOUT - WITH FIREBASE SIGNOUT
        // ============================================================
        async function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                try {
                    // Sign out from Firebase
                    await signOut(auth);
                    console.log('✅ Signed out from Firebase');
                } catch (error) {
                    console.error('Logout error:', error);
                }
                
                // Clear localStorage
                localStorage.removeItem('futuresAbroadUser');
                localStorage.removeItem('selectedActivity');
                localStorage.removeItem('currentActivityId');
                
                // Redirect to login
                window.location.replace('login.html');
            }
        }

        // ============================================================
        // INIT DASHBOARD
        // ============================================================
        function initDashboard() {
            currentUser = getUserData();
            
            if (!currentUser) {
                console.log('❌ No user found, redirecting to login');
                window.location.replace('login.html');
                return;
            }

            userNameDisplay.textContent = currentUser.name || 'Student';
            userGradeDisplay.textContent = `Grade ${currentUser.grade || 10}`;
            userAvatar.textContent = (currentUser.name || 'S')[0].toUpperCase();
            document.getElementById('userName').textContent = currentUser.name || 'Student';

            const interests = currentUser.interests || ['STEM', 'Leadership'];
            displayInterestTags(interests);
            loadActivities();
            setupFilters();
        }

        function displayInterestTags(interests) {
            const tagEmojis = {
                'STEM': '🔬', 'Leadership': '👑', 'Community Service': '🤝',
                'Social Enterprise': '🌱', 'Business': '💼', 'Entrepreneurship': '🚀',
                'Finance': '💰', 'Sustainability': '🌍', 'Environment': '🌿',
                'Computer Science': '💻', 'Engineering': '⚙️', 'Data Science': '📊',
                'Technology': '📱', 'Medicine': '🏥', 'Biology': '🧬',
                'Public Health': '🩺', 'Visual Art': '🎨', 'Graphic Design': '🖌️',
                'Law': '⚖️', 'Political Science': '🏛️', 'International Relations': '🌐',
                'AI & Machine Learning': '🤖', 'Robotics': '⚡', 'Mental Health': '🧠'
            };

            if (interestTagsContainer) {
                interestTagsContainer.innerHTML = interests.map(tag => 
                    `<span class="interest-tag">
                        <span class="tag-icon">${tagEmojis[tag] || '⭐'}</span>
                        ${tag}
                    </span>`
                ).join('');
            }
        }

        function loadActivities() {
            if (!currentUser) return;
            
            const interests = currentUser.interests || ['STEM', 'Leadership'];
            const grade = parseInt(currentUser.grade) || 10;
            
            let activities = [];
            if (typeof getActivitiesByInterests === 'function') {
                activities = getActivitiesByInterests(interests, grade, {
                    type: currentTypeFilter,
                    cost: currentCostFilter
                });
                console.log('✅ Found', activities.length, 'activities');
            }
            
            renderActivities(activities);
        }

        function renderActivities(activities) {
            if (!activities || activities.length === 0) {
                activitiesContainer.innerHTML = `
                    <div class="no-activities">
                        <div class="empty-icon">🔍</div>
                        <h3>No activities found</h3>
                        <p>Try adjusting your filters or complete more of the quiz.</p>
                        <button class="btn-retake-quiz" onclick="retakeQuiz()">🔄 Retake Interest Quiz</button>
                    </div>
                `;
                return;
            }

            const typeColors = {
                'internship': 'internship', 'competition': 'competition',
                'volunteering': 'volunteering', 'course': 'course',
                'workshop': 'workshop', 'summit': 'summit', 'research': 'research'
            };

            const typeEmojis = {
                'internship': '💼', 'competition': '🏆', 'volunteering': '🤝',
                'course': '📚', 'workshop': '🔧', 'summit': '🌍', 'research': '🔬'
            };

            activitiesContainer.innerHTML = `
                <div class="activities-grid">
                    ${activities.map((activity, index) => `
                        <div class="activity-card" style="animation-delay: ${index * 0.05}s">
                            <span class="activity-badge ${typeColors[activity.type] || 'course'}">
                                ${typeEmojis[activity.type] || '📌'} ${activity.type.charAt(0).toUpperCase() + activity.type.slice(1)}
                            </span>
                            <h3>${activity.name}</h3>
                            <div class="activity-meta">
                                <span>📅 ${activity.duration}</span>
                                <span>💰 ${activity.cost}</span>
                                <span>📌 ${activity.country}</span>
                            </div>
                            <div class="activity-rationale">
                                <span class="rationale-icon">🧠</span>
                                ${getAIRationale(activity, currentUser)}
                            </div>
                            <div class="activity-tags">
                                ${activity.interest_tags.map(tag => 
                                    `<span class="mini-tag">#${tag}</span>`
                                ).join('')}
                            </div>
                            <div class="card-footer">
                                <span class="deadline">
                                    ⏰ Deadline: ${formatDate(activity.deadline)}
                                    ${isUrgent(activity.deadline) ? ' <span class="urgent">🔴 Urgent</span>' : ''}
                                </span>
                                <button class="btn-register" onclick="event.stopPropagation(); goToPhase3(${activity.id})">
                                    Register Now →
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function goToPhase3(activityId) {
            console.log('🔵 Going to Phase 3 Registration for activity:', activityId);
            
            const activity = getActivityById(activityId);
            if (!activity) {
                alert('Activity not found. Please try again.');
                return;
            }
            
            localStorage.setItem('selectedActivity', JSON.stringify(activity));
            localStorage.setItem('currentActivityId', activityId);
            window.location.href = 'activity-registration.html?id=' + activityId;
        }

        function getAIRationale(activity, user) {
            if (activity.ai_rationale) return activity.ai_rationale;
            
            const rationales = {
                'Leadership': 'Develops leadership skills essential for university applications.',
                'Community Service': 'Shows your commitment to making a difference — universities love this!',
                'Business': 'Perfect if you\'re interested in business and entrepreneurship.',
                'Sustainability': 'Great for students passionate about the environment.',
                'STEM': 'Builds strong technical skills that top universities look for.',
                'Medicine': 'Great preparation for medical school applications.',
                'Technology': 'Develops future-ready tech skills in high demand.'
            };

            for (const tag of user.interests || []) {
                if (activity.interest_tags.some(at => at.includes(tag) || tag.includes(at))) {
                    return rationales[tag] || `Recommended because you're interested in ${tag}.`;
                }
            }
            return 'This activity aligns with your interests and goals.';
        }

        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            } catch (e) {
                return dateStr;
            }
        }

        function isUrgent(dateStr) {
            try {
                const deadline = new Date(dateStr);
                const now = new Date();
                const diffDays = (deadline - now) / (1000 * 60 * 60 * 24);
                return diffDays <= 14 && diffDays > 0;
            } catch (e) {
                return false;
            }
        }

        function setupFilters() {
            document.querySelectorAll('[data-filter]').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentTypeFilter = this.dataset.filter;
                    loadActivities();
                });
            });

            document.querySelectorAll('[data-cost]').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('[data-cost]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCostFilter = this.dataset.cost;
                    loadActivities();
                });
            });
        }

        function retakeQuiz() {
            if (confirm('Retaking the quiz will update your recommendations. Continue?')) {
                localStorage.removeItem('futuresAbroadUser');
                window.location.href = 'signup.html';
            }
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        logoutBtn.addEventListener('click', handleLogout);

        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 DOM loaded, initializing...');
            initDashboard();
        });
    </script>
</body>
</html>
