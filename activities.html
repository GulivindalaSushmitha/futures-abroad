<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Futures Abroad - Student App</title>
    <!-- Redirect to the new student app -->
    <meta http-equiv="refresh" content="0; url=student-app.html" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f0ff 0%, #e8e0f5 100%);
            margin: 0;
            padding: 20px;
        }
        .redirect-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(108, 60, 225, 0.15);
            max-width: 500px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f0e6ff;
            border-top-color: #6C3CE1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 { color: #2D1B4E; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="spinner"></div>
        <h2>🚀 Redirecting to Student App</h2>
        <p>You are being redirected to the Futures Abroad Student App...</p>
        <p style="font-size: 14px; margin-top: 10px;">
            If you are not redirected automatically, 
            <a href="student-app.html" style="color: #6C3CE1; font-weight: 600;">click here</a>.
        </p>
    </div>
</body>
</html>
