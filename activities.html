<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activities - Futures Abroad</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .activities-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            min-height: 100vh;
            background: #FFF8F0;
        }
        .activities-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .activities-header .logo {
            font-size: 24px;
            font-weight: 800;
            color: #2D1B4E;
        }
        .activities-header .logo span { color: #6C3CE1; }
        .filter-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .filter-bar select {
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid #E8E0F0;
            font-family: 'Quicksand', sans-serif;
            background: white;
            cursor: pointer;
            min-width: 150px;
        }
        .filter-bar select:focus {
            border-color: #6C3CE1;
            outline: none;
        }
        .filter-bar .btn-primary {
            padding: 12px 24px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .filter-bar .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108,60,225,0.3);
        }
        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }
        .activity-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: all 0.3s;
            position: relative;
            border: 2px solid #f0e6ff;
        }
        .activity-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(108,60,225,0.12);
            border-color: #6C3CE1;
        }
        .activity-card .card-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
        }
        .activity-card .top-match {
            background: #6C3CE1;
            color: white;
        }
        .activity-card .good-fit {
            background: #FFD93D;
            color: #2D1B4E;
        }
        .activity-card .registered-badge {
            background: #22c55e;
            color: white;
        }
        .activity-card h3 {
            font-size: 20px;
            color: #2D1B4E;
            margin: 10px 0 8px;
        }
        .activity-card .meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 14px;
            color: #555;
            margin-bottom: 12px;
        }
        .activity-card .rationale {
            background: #f8f4ff;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            color: #555;
            border-left: 4px solid #6C3CE1;
            margin-bottom: 12px;
        }
        .activity-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        .activity-card .tags span {
            background: #f0e6ff;
            color: #6C3CE1;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        .activity-card .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .activity-card .actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-detail {
            background: #f0e6ff;
            color: #6C3CE1;
        }
        .btn-detail:hover {
            background: #6C3CE1;
            color: white;
        }
        .btn-register {
            background: #6C3CE1;
            color: white;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108,60,225,0.3);
        }
        .btn-register.registered {
            background: #22c55e;
            cursor: default;
        }
        .btn-register.registered:hover {
            transform: none;
            box-shadow: none;
        }
        .btn-back {
            padding: 10px 24px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108,60,225,0.3);
        }
        .btn-logout {
            padding: 10px 24px;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6C3CE1;
        }
        .loading .spinner {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 30px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
            animation: modalPop 0.3s ease;
        }
        @keyframes modalPop {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
            z-index: 10;
        }
        .modal-close:hover {
            color: #FF6B6B;
            transform: rotate(90deg);
        }
        .modal-content .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
            padding: 15px;
            background: #f8f4ff;
            border-radius: 16px;
        }
        .modal-content .detail-grid div {
            font-size: 14px;
        }
        .modal-content .detail-grid strong {
            color: #2D1B4E;
        }
        @media (max-width: 768px) {
            .activity-grid {
                grid-template-columns: 1fr;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-bar select {
                width: 100%;
            }
            .modal-content {
                padding: 25px 20px;
            }
            .modal-content .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="activities-container">
        <div class="activities-header">
            <div class="logo">🚀 Futures <span>Abroad</span></div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-back" onclick="window.location.href='dashboard.html'">← Dashboard</button>
                <button class="btn-logout" onclick="logoutUser()">Logout</button>
            </div>
        </div>

        <h1 style="font-size: 32px; color: #2D1B4E; text-align: center; margin-bottom: 5px;">🎯 Your Activity Feed</h1>
        <p style="text-align: center; color: #888; margin-bottom: 30px;">Activities curated just for you based on your interests</p>

        <div class="filter-bar">
            <select id="filterType">
                <option value="all">📌 All Types</option>
                <option value="competition">🏆 Competition</option>
                <option value="internship">💼 Internship</option>
                <option value="volunteering">🤝 Volunteering</option>
                <option value="course">📚 Course</option>
                <option value="workshop">🔧 Workshop</option>
            </select>
            <select id="filterCost">
                <option value="all">💰 All Costs</option>
                <option value="Free">🆓 Free</option>
                <option value="Paid">💳 Paid</option>
                <option value="Scholarship">🎓 Scholarship</option>
            </select>
            <button class="btn-primary" onclick="applyFilters()">Apply Filters</button>
            <button class="btn-primary" onclick="loadActivities()" style="background: #FFD93D; color: #2D1B4E;">🔄 Refresh</button>
        </div>

        <div id="activity-grid" class="activity-grid">
            <div class="loading">
                <div class="spinner">⏳</div>
                <p>Loading activities...</p>
            </div>
        </div>
    </div>

    <!-- Activity Detail Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeDetailModal()">✕</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, 
            db, 
            onAuthStateChanged, 
            signOut,
            doc,
            getDoc,
            getDocs,
            collection,
            updateDoc,
            arrayUnion
        } from './js/firebase-config.js';

        let currentUser = null;
        let currentUserData = null;
        let allActivities = [];

        // Auth check
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            
            // Load user data
            const studentDoc = await getDoc(doc(db, 'students', user.uid));
            if (studentDoc.exists()) {
                currentUserData = studentDoc.data();
            } else {
                currentUserData = { registered_activities: [], interests: [] };
            }
            
            loadActivities();
        });

        // Logout
        window.logoutUser = async function() {
            await signOut(auth);
            window.location.href = 'index.html';
        };

        // ========================================
        // LOAD ACTIVITIES
        // ========================================
        window.loadActivities = async function() {
            const grid = document.getElementById('activity-grid');
            grid.innerHTML = `
                <div class="loading">
                    <div class="spinner">⏳</div>
                    <p>Loading activities...</p>
                </div>
            `;

            try {
                const snapshot = await getDocs(collection(db, 'activities'));
                
                if (snapshot.empty) {
                    grid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; background: white; border-radius: 20px;">
                            <div style="font-size: 48px;">🔍</div>
                            <h3 style="color: #2D1B4E;">No Activities Found</h3>
                            <p style="color: #888;">No activities available yet. Check back soon!</p>
                            <button onclick="window.location.href='dashboard.html'" class="btn-back" style="margin-top: 15px;">Go to Dashboard</button>
                        </div>
                    `;
                    return;
                }

                const activities = [];
                const registered = currentUserData?.registered_activities || [];
                const interests = currentUserData?.interests || [];

                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    data.isRegistered = registered.includes(doc.id);
                    
                    // Calculate match score
                    const matchCount = (data.interest_tags || []).filter(tag => 
                        interests.some(interest => 
                            tag.toLowerCase().includes(interest.toLowerCase()) || 
                            interest.toLowerCase().includes(tag.toLowerCase())
                        )
                    ).length;
                    data.matchScore = data.interest_tags && data.interest_tags.length > 0 ? 
                        matchCount / data.interest_tags.length : 0;
                    
                    activities.push(data);
                });

                activities.sort((a, b) => b.matchScore - a.matchScore);
                allActivities = activities;
                renderActivities(activities);

            } catch (error) {
                console.error('Error loading activities:', error);
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; background: white; border-radius: 20px;">
                        <div style="font-size: 48px;">⚠️</div>
                        <h3 style="color: #2D1B4E;">Error Loading Activities</h3>
                        <p style="color: #888;">${error.message}</p>
                        <button onclick="loadActivities()" class="btn-back" style="margin-top: 15px;">🔄 Try Again</button>
                    </div>
                `;
            }
        };

        // ========================================
        // RENDER ACTIVITIES
        // ========================================
        function renderActivities(activities) {
            const grid = document.getElementById('activity-grid');
            
            if (!activities || activities.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; background: white; border-radius: 20px;">
                        <div style="font-size: 48px;">🔍</div>
                        <h3 style="color: #2D1B4E;">No matching activities</h3>
                        <p style="color: #888;">Try adjusting your filters or update your interests.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = activities.map((activity, index) => `
                <div class="activity-card" style="animation: fadeInUp 0.5s ease ${index * 0.08}s both;">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px;">
                        <span class="card-badge ${activity.matchScore > 0.5 ? 'top-match' : 'good-fit'}">
                            ${activity.matchScore > 0.5 ? '🔥 Top Match' : '💡 Good Fit'}
                        </span>
                        ${activity.isRegistered ? `<span class="card-badge registered-badge">✅ Registered</span>` : ''}
                    </div>
                    
                    <h3>${activity.name}</h3>
                    
                    <div class="meta">
                        <span>⏱️ ${activity.duration || 'N/A'}</span>
                        <span>💰 ${activity.cost || 'Free'}</span>
                        <span>📅 ${activity.deadline ? new Date(activity.deadline).toLocaleDateString() : 'Rolling'}</span>
                    </div>
                    
                    <div class="rationale">
                        <strong>✨ Why this fits you:</strong> 
                        ${activity.rationale || 'Based on your interests and goals.'}
                    </div>
                    
                    <div class="tags">
                        ${(activity.interest_tags || []).slice(0, 4).map(tag => 
                            `<span>#${tag}</span>`
                        ).join('')}
                    </div>
                    
                    <div class="actions">
                        <button class="btn-detail" onclick="showDetail('${activity.id}')">📖 Details</button>
                        <button class="btn-register ${activity.isRegistered ? 'registered' : ''}" 
                                onclick="registerActivity('${activity.id}')"
                                ${activity.isRegistered ? 'disabled' : ''}>
                            ${activity.isRegistered ? '✅ Registered' : '📝 Register'}
                        </button>
                    </div>
                </div>
            `).join('');

            // Add animation styles if not present
            if (!document.getElementById('activityStyles')) {
                const style = document.createElement('style');
                style.id = 'activityStyles';
                style.textContent = `
                    @keyframes fadeInUp {
                        from { opacity: 0; transform: translateY(30px); }
                        to { opacity: 1; transform: translateY(0); }
                    }
                `;
                document.head.appendChild(style);
            }
        }

        // ========================================
        // SHOW DETAIL MODAL
        // ========================================
        window.showDetail = async function(activityId) {
            try {
                const docRef = doc(db, 'activities', activityId);
                const docSnap = await getDoc(docRef);
                const activity = docSnap.data();
                
                if (!activity) {
                    alert('Activity not found.');
                    return;
                }

                const modal = document.getElementById('detailModal');
                const content = document.getElementById('detailContent');
                const isRegistered = currentUserData?.registered_activities?.includes(activityId) || false;

                content.innerHTML = `
                    <div style="border-bottom: 2px solid #f0e6ff; padding-bottom: 15px; margin-bottom: 20px;">
                        <h2 style="color: #2D1B4E; font-size: 28px; margin-bottom: 5px;">${activity.name}</h2>
                        <span style="background: #6C3CE1; color: white; padding: 4px 18px; border-radius: 50px; font-size: 14px; font-weight: 700; display: inline-block;">
                            ${activity.type || 'Activity'}
                        </span>
                        ${isRegistered ? '<span style="background: #22c55e; color: white; padding: 4px 18px; border-radius: 50px; font-size: 14px; font-weight: 700; margin-left: 10px;">✅ Registered</span>' : ''}
                    </div>
                    
                    <div class="detail-grid">
                        <div><strong>📍 Location:</strong> ${activity.country || 'Global'}</div>
                        <div><strong>⏱️ Duration:</strong> ${activity.duration || 'N/A'}</div>
                        <div><strong>💰 Cost:</strong> ${activity.cost || 'Free'}</div>
                        <div><strong>📅 Deadline:</strong> ${activity.deadline ? new Date(activity.deadline).toLocaleDateString() : 'Rolling'}</div>
                        <div style="grid-column: 1/-1;"><strong>🎓 Grades:</strong> ${activity.grade_min || 10} - ${activity.grade_max || 12}</div>
                    </div>
                    
                    <div style="margin: 20px 0;">
                        <h4 style="color: #2D1B4E;">📝 Description</h4>
                        <p style="color: #555; line-height: 1.6;">${activity.description || 'No description available.'}</p>
                    </div>
                    
                    <div style="margin: 20px 0;">
                        <h4 style="color: #2D1B4E;">🎯 Skills You\'ll Gain</h4>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                            ${(activity.skills_gained || []).map(skill => 
                                `<span style="background: #f0e6ff; color: #6C3CE1; padding: 6px 16px; border-radius: 50px; font-size: 14px; font-weight: 600;">${skill}</span>`
                            ).join('') || '<span style="color: #888;">No skills listed yet.</span>'}
                        </div>
                    </div>
                    
                    ${!isRegistered ? `
                        <button onclick="registerActivity('${activityId}')" 
                                class="btn-register" style="width: 100%; padding: 16px; font-size: 18px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer;">
                            📝 Register for This Activity
                        </button>
                    ` : `
                        <div style="background: #dcfce7; padding: 15px; border-radius: 12px; text-align: center;">
                            <strong style="color: #16a34a;">✅ You are already registered for this activity!</strong>
                        </div>
                    `}
                `;

                modal.classList.add('active');
                document.body.style.overflow = 'hidden';

            } catch (error) {
                console.error('Error loading detail:', error);
                alert('Unable to load activity details.');
            }
        };

        window.closeDetailModal = function() {
            const modal = document.getElementById('detailModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        // Close modal on overlay click
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeDetailModal();
        });

        // ========================================
        // REGISTER FOR ACTIVITY
        // ========================================
        window.registerActivity = async function(activityId) {
            if (!currentUser) {
                alert('Please log in first.');
                window.location.href = 'login.html';
                return;
            }

            // Check if already registered
            if (currentUserData?.registered_activities?.includes(activityId)) {
                alert('You are already registered for this activity!');
                return;
            }

            try {
                const studentRef = doc(db, 'students', currentUser.uid);
                await updateDoc(studentRef, {
                    registered_activities: arrayUnion(activityId)
                });

                // Update local data
                if (!currentUserData.registered_activities) {
                    currentUserData.registered_activities = [];
                }
                currentUserData.registered_activities.push(activityId);

                alert('✅ You have successfully registered for this activity!');
                closeDetailModal();
                loadActivities();

            } catch (error) {
                console.error('Registration error:', error);
                alert('❌ Unable to register. Please try again.');
            }
        };

        // ========================================
        // FILTER ACTIVITIES
        // ========================================
        window.applyFilters = function() {
            const type = document.getElementById('filterType').value;
            const cost = document.getElementById('filterCost').value;

            const filtered = allActivities.filter(activity => {
                let match = true;
                if (type !== 'all' && activity.type !== type) match = false;
                if (cost !== 'all' && activity.cost !== cost) match = false;
                return match;
            });

            renderActivities(filtered);
        };

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeDetailModal();
        });

        console.log('🎯 Activities page loaded!');
    </script>
</body>
</html>
