<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Complete | Futures Abroad</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F0A1E;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .success-container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
        }
        .success-icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        p { color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.6; }
        .btn-dashboard {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #6C3CE1 0%, #00D4AA 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        .btn-dashboard:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 32px rgba(108, 60, 225, 0.3);
        }
        .btn-secondary {
            display: inline-block;
            padding: 12px 30px;
            margin-top: 10px;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .btn-secondary:hover {
            border-color: white;
            color: white;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">🎉</div>
        <h1>Registration Complete!</h1>
        <p>You've successfully registered for your activity. Your progress has been saved to your portfolio.</p>
        <div class="btn-group">
            <a href="dashboard.html" class="btn-dashboard">📊 Go to Dashboard</a>
            <a href="student-app.html" class="btn-secondary">🎯 Find More Activities</a>
        </div>
    </div>
</body>
</html>
