<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Futures Abroad</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <style>
        .admin-login-hint {
            background: #FFF3E0;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            font-size: 13px;
            color: #E65100;
            border: 1px solid #FFE0B2;
        }
        .admin-login-hint strong { color: #BF360C; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🔐 Futures Abroad</div>
                <h1>Admin Login</h1>
                <p>Access the admin dashboard</p>
            </div>
            <form id="admin-login-form" class="auth-form">
                <div id="adminMessage" style="display:none; padding:10px; border-radius:10px; margin-bottom:10px;"></div>
                
                <div class="admin-login-hint">
                    <strong>🔑 Admin Credentials (YOURS ONLY):</strong><br />
                    Email: admin@futuresabroad.com<br />
                    Password: FuturesAdmin2026!
                </div>
                
                <div class="form-group">
                    <label>Admin Email</label>
                    <input type="email" id="admin-email" placeholder="admin@futuresabroad.com" value="admin@futuresabroad.com" required />
                </div>
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" id="admin-password" placeholder="Enter password" required />
                </div>
                <button type="submit" class="btn-submit">Login as Admin 🔐</button>
            </form>
            <div class="auth-footer">
                <p><a href="index.html">← Back to Home</a></p>
                <p>Student login? <a href="login.html">Click here</a></p>
            </div>
        </div>
        <div class="auth-illustration">
            <div id="admin-animation"></div>
            <p style="text-align:center;margin-top:2rem;">🔒 Secure Admin Access</p>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        // ============================================================
        // HARDCODED ADMIN UID - This is YOUR admin user's UID
        // ============================================================
        const ADMIN_UID = "hrONkvAlxVac4Wc7nwdNlLhd";

        document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const msgEl = document.getElementById('adminMessage');
            
            try {
                // Try to sign in
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Check if the signed-in user's UID matches the hardcoded admin UID
                if (user.uid === ADMIN_UID) {
                    // Check if admin document exists in Firestore
                    const adminDoc = await db.collection('admins').doc(ADMIN_UID).get();
                    if (adminDoc.exists) {
                        window.location.href = 'admin-dashboard.html';
                        return;
                    } else {
                        // Create the admin document if it doesn't exist
                        await db.collection('admins').doc(ADMIN_UID).set({
                            email: "admin@futuresabroad.com",
                            role: "admin"
                        });
                        window.location.href = 'admin-dashboard.html';
                        return;
                    }
                } else {
                    await auth.signOut();
                    msgEl.style.display = 'block';
                    msgEl.style.background = '#FFE8E8';
                    msgEl.style.color = '#C62828';
                    msgEl.textContent = '❌ Access denied. You are not an admin.';
                }
            } catch (error) {
                msgEl.style.display = 'block';
                msgEl.style.background = '#FFE8E8';
                msgEl.style.color = '#C62828';
                msgEl.textContent = '❌ Login failed: ' + error.message;
            }
        });
    </script>
</body>
</html>
