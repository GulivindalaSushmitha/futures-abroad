<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio - Futures Abroad</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .portfolio-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            min-height: 100vh;
            background: #FFF8F0;
        }
        .portfolio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .portfolio-header .logo {
            font-size: 24px;
            font-weight: 800;
            color: #2D1B4E;
        }
        .portfolio-header .logo span { color: #6C3CE1; }
        .btn-back {
            padding: 10px 24px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-back:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,60,225,0.3); }
        .btn-logout {
            padding: 10px 24px;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-logout:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,107,107,0.3); }
        .btn-primary {
            padding: 10px 24px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,60,225,0.3); }
        .portfolio-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-left: 5px solid #6C3CE1;
            transition: all 0.3s;
        }
        .portfolio-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 30px rgba(108,60,225,0.12);
        }
        .portfolio-card h3 {
            color: #2D1B4E;
            margin-bottom: 5px;
            font-size: 20px;
        }
        .portfolio-card .meta {
            color: #888;
            font-size: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .portfolio-card .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        .portfolio-card .skills span {
            background: #f0e6ff;
            color: #6C3CE1;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        .portfolio-card .status-badge {
            display: inline-block;
            padding: 4px 14px;
            background: #22c55e;
            color: white;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 10px;
        }
        .portfolio-card .reflection-preview {
            background: #f8f4ff;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 12px;
            font-size: 14px;
            color: #555;
            border-left: 3px solid #6C3CE1;
        }
        .portfolio-card .reflection-preview .reflection-label {
            font-weight: 700;
            color: #2D1B4E;
        }
        .essay-badge {
            display: inline-block;
            background: #f7971e;
            color: white;
            padding: 2px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 5px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
        }
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        .empty-state h3 {
            color: #2D1B4E;
        }
        .empty-state p {
            color: #888;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .loading .spinner {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .stats-bar {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            background: #F8F4FF;
            padding: 15px 25px;
            border-radius: 16px;
            margin-bottom: 25px;
        }
        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats-bar .stat-item .num {
            font-weight: 800;
            font-size: 22px;
            color: #6C3CE1;
        }
        .stats-bar .stat-item .label {
            color: #888;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .stats-bar {
                flex-direction: column;
                gap: 10px;
            }
            .portfolio-card .meta {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="portfolio-container">
        <div class="portfolio-header">
            <div class="logo">📂 Futures <span>Abroad</span></div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-back" onclick="window.location.href='dashboard.html'">← Dashboard</button>
                <button class="btn-primary" onclick="window.location.href='activities.html'">🎯 Activities</button>
                <button class="btn-logout" onclick="logoutUser()">Logout</button>
            </div>
        </div>

        <h1 style="font-size: 32px; color: #2D1B4E; margin-bottom: 5px;">📂 My Portfolio</h1>
        <p style="color: #888; margin-bottom: 30px;">All your completed activities and reflections</p>

        <div id="portfolio-content">
            <div class="loading">
                <div class="spinner">⏳</div>
                <p>Loading your portfolio...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, db, COLLECTIONS,
            doc, getDoc, getDocs, collection,
            onAuthStateChanged, signOut,
            query, where
        } from './js/firebase-config.js';

        window.logoutUser = async function() {
            await signOut(auth);
            window.location.href = 'index.html';
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            await loadPortfolio(user);
        });

        async function loadPortfolio(user) {
            const container = document.getElementById('portfolio-content');
            
            try {
                // Get portfolio entries
                const portfolioRef = collection(db, COLLECTIONS.studentPortfolio);
                const q = query(portfolioRef, where("userId", "==", user.uid));
                const snapshot = await getDocs(q);
                
                const activities = [];
                snapshot.forEach(doc => {
                    activities.push({ id: doc.id, ...doc.data() });
                });

                if (activities.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📂</div>
                            <h3>No Portfolio Yet</h3>
                            <p>Complete your first activity to start building your portfolio.</p>
                            <button onclick="window.location.href='student-app.html'" class="btn-back" style="margin-top:15px;">🎯 Find Activities</button>
                        </div>
                    `;
                    return;
                }

                // Sort by date (newest first)
                activities.sort((a, b) => {
                    return new Date(b.dateCompleted || 0) - new Date(a.dateCompleted || 0);
                });

                // Stats
                const hasReflections = activities.filter(a => 
                    a.reflectionResponses && Object.keys(a.reflectionResponses).length > 0
                );
                const essayPotential = activities.filter(a => a.essayPotentialFlag);

                let html = `
                    <div class="stats-bar">
                        <div class="stat-item">
                            <span class="num">${activities.length}</span>
                            <span class="label">📋 Completed Activities</span>
                        </div>
                        <div class="stat-item">
                            <span class="num">${hasReflections.length}</span>
                            <span class="label">📝 Reflections</span>
                        </div>
                        <div class="stat-item">
                            <span class="num">${essayPotential.length}</span>
                            <span class="label">📄 Essay Potential</span>
                        </div>
                    </div>
                `;

                // Display each activity
                for (const entry of activities) {
                    const reflectionCount = entry.reflectionResponses ? 
                        Object.keys(entry.reflectionResponses).filter(k => entry.reflectionResponses[k]).length : 0;
                    
                    html += `
                        <div class="portfolio-card">
                            <h3>${entry.activityName || 'Activity'}</h3>
                            <div class="meta">
                                <span>📌 ${entry.type || 'General'}</span>
                                <span>⏱️ ${entry.duration || 'N/A'}</span>
                                <span>✅ Completed: ${entry.dateCompleted || 'N/A'}</span>
                            </div>
                            ${entry.skills && entry.skills.length > 0 ? `
                                <div class="skills">
                                    ${entry.skills.map(s => `<span>${s}</span>`).join('')}
                                </div>
                            ` : ''}
                            ${entry.essayPotentialFlag ? `<span class="essay-badge">📝 Essay Potential</span>` : ''}
                            ${reflectionCount > 0 ? `
                                <div class="reflection-preview">
                                    <div class="reflection-label">📝 ${reflectionCount} Reflection${reflectionCount > 1 ? 's' : ''} Saved</div>
                                    ${entry.reflectionResponses?.q1 ? `<div style="margin-top:5px;">💬 ${entry.reflectionResponses.q1.substring(0, 100)}${entry.reflectionResponses.q1.length > 100 ? '...' : ''}</div>` : ''}
                                </div>
                            ` : `
                                <div style="margin-top:12px;color:#888;font-size:14px;">
                                    ⚠️ No reflection saved yet. 
                                    <a href="post-activity.html?id=${entry.activityId}" style="color:#6C3CE1;font-weight:600;">Add Reflection</a>
                                </div>
                            `}
                            <span class="status-badge">✅ Completed</span>
                        </div>
                    `;
                }

                container.innerHTML = html;

            } catch (error) {
                console.error('Error loading portfolio:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h3>Error Loading Portfolio</h3>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" class="btn-back" style="margin-top:15px;">🔄 Try Again</button>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
