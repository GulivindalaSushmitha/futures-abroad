<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio - Futures Abroad</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .portfolio-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            min-height: 100vh;
            background: #FFF8F0;
        }
        .portfolio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .portfolio-header .logo {
            font-size: 24px;
            font-weight: 800;
            color: #2D1B4E;
        }
        .portfolio-header .logo span { color: #6C3CE1; }
        .btn-back {
            padding: 10px 24px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-back:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,60,225,0.3); }
        .btn-logout {
            padding: 10px 24px;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-logout:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,107,107,0.3); }
        .btn-primary {
            padding: 10px 24px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,60,225,0.3); }
        .portfolio-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-left: 5px solid #6C3CE1;
            transition: all 0.3s;
        }
        .portfolio-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 30px rgba(108,60,225,0.12);
        }
        .portfolio-card h3 {
            color: #2D1B4E;
            margin-bottom: 5px;
            font-size: 20px;
        }
        .portfolio-card .meta {
            color: #888;
            font-size: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .portfolio-card .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        .portfolio-card .skills span {
            background: #f0e6ff;
            color: #6C3CE1;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        .portfolio-card .status-badge {
            display: inline-block;
            padding: 4px 14px;
            background: #22c55e;
            color: white;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
        }
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        .empty-state h3 {
            color: #2D1B4E;
        }
        .empty-state p {
            color: #888;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .loading .spinner {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .stats-bar {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            background: #F8F4FF;
            padding: 15px 25px;
            border-radius: 16px;
            margin-bottom: 25px;
        }
        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats-bar .stat-item .num {
            font-weight: 800;
            font-size: 22px;
            color: #6C3CE1;
        }
        .stats-bar .stat-item .label {
            color: #888;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .stats-bar {
                flex-direction: column;
                gap: 10px;
            }
            .portfolio-card .meta {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="portfolio-container">
        <div class="portfolio-header">
            <div class="logo">📂 Futures <span>Abroad</span></div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-back" onclick="window.location.href='dashboard.html'">← Dashboard</button>
                <button class="btn-primary" onclick="window.location.href='activities.html'">🎯 Activities</button>
                <button class="btn-logout" onclick="logoutUser()">Logout</button>
            </div>
        </div>

        <h1 style="font-size: 32px; color: #2D1B4E; margin-bottom: 5px;">📂 My Portfolio</h1>
        <p style="color: #888; margin-bottom: 30px;">All your registered activities and progress</p>

        <div id="portfolio-content">
            <div class="loading">
                <div class="spinner">⏳</div>
                <p>Loading your portfolio...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, 
            db, 
            onAuthStateChanged, 
            signOut,
            doc,
            getDoc,
            getDocs,
            collection
        } from './js/firebase-config.js';

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            await loadPortfolio(user);
        });

        window.logoutUser = async function() {
            await signOut(auth);
            window.location.href = 'index.html';
        };

        async function loadPortfolio(user) {
            const container = document.getElementById('portfolio-content');
            
            try {
                const studentDoc = await getDoc(doc(db, 'students', user.uid));
                
                if (!studentDoc.exists()) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📂</div>
                            <h3>No Portfolio Yet</h3>
                            <p>Complete your profile and register for activities to build your portfolio.</p>
                            <button onclick="window.location.href='activities.html'" class="btn-back" style="margin-top: 15px;">🎯 Find Activities</button>
                        </div>
                    `;
                    return;
                }

                const studentData = studentDoc.data();
                const registeredIds = studentData.registered_activities || [];

                // REMOVE DUPLICATES using Set
                const uniqueIds = [...new Set(registeredIds)];

                if (uniqueIds.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🔍</div>
                            <h3>No Activities Registered</h3>
                            <p>You haven't registered for any activities yet. Start exploring now!</p>
                            <button onclick="window.location.href='activities.html'" class="btn-back" style="margin-top: 15px;">🎯 Explore Activities</button>
                        </div>
                    `;
                    return;
                }

                // Show stats
                let html = `
                    <div class="stats-bar">
                        <div class="stat-item">
                            <span class="num">${uniqueIds.length}</span>
                            <span class="label">📋 Registered Activities</span>
                        </div>
                        <div class="stat-item">
                            <span class="num">${studentData.profileStrength || 0}%</span>
                            <span class="label">📊 Profile Strength</span>
                        </div>
                        <div class="stat-item">
                            <span class="num">${studentData.interests?.length || 0}</span>
                            <span class="label">🎯 Interests</span>
                        </div>
                    </div>
                `;

                // Show each activity (using unique IDs)
                for (const activityId of uniqueIds) {
                    try {
                        const activityDoc = await getDoc(doc(db, 'activities', activityId));
                        if (activityDoc.exists()) {
                            const activity = activityDoc.data();
                            html += `
                                <div class="portfolio-card">
                                    <h3>${activity.name}</h3>
                                    <div class="meta">
                                        <span>📌 ${activity.type || 'Activity'}</span>
                                        <span>⏱️ ${activity.duration || 'N/A'}</span>
                                        <span>💰 ${activity.cost || 'Free'}</span>
                                        <span>📍 ${activity.country || 'Global'}</span>
                                    </div>
                                    <div class="skills">
                                        ${(activity.skills_gained || []).map(skill => 
                                            `<span>${skill}</span>`
                                        ).join('') || '<span style="background: #eee; color: #888;">No skills listed</span>'}
                                    </div>
                                    <span class="status-badge">✅ Registered</span>
                                </div>
                            `;
                        }
                    } catch (e) {
                        console.error('Error fetching activity:', e);
                    }
                }

                container.innerHTML = html;

            } catch (error) {
                console.error('Error loading portfolio:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h3>Error Loading Portfolio</h3>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" class="btn-back" style="margin-top: 15px;">🔄 Try Again</button>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
