<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 4 - Post Activity Reflection</title>
    <link rel="stylesheet" href="css/post-activity.css">
    <link rel="stylesheet" href="css/student-app.css">
</head>
<body>
    <div class="app-container">
        <!-- Phase Navigation -->
        <div id="phase-navigation"></div>

        <div id="phase4-container" class="phase-container">
            <h1>Phase 4: Post-Activity Guidance</h1>
            <p class="subtitle">Reflect on your experience with <strong id="activity-name-display">this activity</strong></p>

            <div class="reflection-form">
                <div class="form-group">
                    <label for="completion-date">Date Completed:</label>
                    <input type="date" id="completion-date" />
                </div>

                <div class="form-group">
                    <label for="outcome-note">What did you gain from this experience?</label>
                    <textarea id="outcome-note" rows="3" placeholder="Write a brief outcome note..."></textarea>
                </div>

                <h3>Reflection Prompts</h3>
                <p class="hint">Answer these questions to capture your learning. These can be used in future essays.</p>
                <div id="reflection-prompts"></div>

                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
                    <button id="save-reflection" class="primary-btn">💾 Save Reflection</button>
                    <button id="phase5-button" class="secondary-btn" style="display: none;">
                        Continue to University Pathway →
                    </button>
                </div>
            </div>

            <!-- Profile Strength -->
            <div class="strength-section" style="margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 8px;">
                <h3>Your Profile Strength</h3>
                <div class="progress-bar">
                    <div id="strength-bar" class="progress-fill" style="width: 0%"></div>
                </div>
                <p style="margin-top: 8px;">Score: <span id="profile-strength-score">0</span>%</p>
                <p style="color: #64748b; font-size: 13px;">Activities in portfolio: <span id="portfolio-count">0</span></p>
            </div>

            <div id="notification-container"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/phase-navigation.js"></script>
    <script src="js/phase-detection.js"></script>
    <script src="phase4-complete.js"></script>
    <script>
        // Initialize phase detection
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initPhaseDetection === 'function') {
                initPhaseDetection();
            }
        });
    </script>
</body>
</html>
