<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Futures Abroad</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            min-height: 100vh;
            background: #FFF8F0;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .dashboard-header .logo {
            font-size: 24px;
            font-weight: 800;
            color: #2D1B4E;
        }
        .dashboard-header .logo span { color: #6C3CE1; }
        .dashboard-header .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        .dashboard-card {
            background: #F8F4FF;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .dashboard-card:hover {
            border-color: #6C3CE1;
            transform: translateY(-3px);
        }
        .dashboard-card .number {
            font-size: 32px;
            font-weight: 800;
            color: #6C3CE1;
        }
        .dashboard-card .label {
            color: #888;
            font-size: 14px;
            font-weight: 600;
        }
        .btn-logout {
            padding: 10px 24px;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-logout:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,107,107,0.3); }
        .btn-back {
            padding: 10px 24px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-back:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,60,225,0.3); }
        .btn-primary {
            padding: 10px 24px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,60,225,0.3); }
        .btn-secondary {
            padding: 10px 24px;
            background: transparent;
            color: #6C3CE1;
            border: 2px solid #6C3CE1;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-secondary:hover { background: #6C3CE1; color: white; }
        .interests-tag {
            display: inline-block;
            padding: 4px 14px;
            background: #6C3CE1;
            color: white;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin: 3px;
        }
        .registered-activity-item {
            padding: 10px 15px;
            background: #F0E6FF;
            border-radius: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="logo">🚀 Futures <span>Abroad</span></div>
            <div class="header-actions">
                <button class="btn-back" onclick="window.location.href='index.html'">← Home</button>
                <button class="btn-primary" onclick="window.location.href='activities.html'">🎯 Activities</button>
                <button class="btn-logout" onclick="logoutUser()">Logout</button>
            </div>
        </div>
        
        <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);">
            <h1 id="welcome-text">Welcome!</h1>
            <p id="user-email" style="color: #888;">Loading...</p>
            
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <div class="number" id="profile-strength">0%</div>
                    <div class="label">📊 Profile Strength</div>
                </div>
                <div class="dashboard-card">
                    <div class="number" id="activity-count">0</div>
                    <div class="label">📋 Registered Activities</div>
                </div>
                <div class="dashboard-card">
                    <div class="number" id="quiz-status">⏳</div>
                    <div class="label">🎯 Quiz Status</div>
                </div>
                <div class="dashboard-card">
                    <div class="number" id="phase">1</div>
                    <div class="label">🔄 Phase</div>
                </div>
            </div>

            <div id="user-interests" style="margin: 20px 0; padding: 15px; background: #F0E6FF; border-radius: 12px;">
                <strong>🎯 Your Interests:</strong> <span id="interests-list">Not set</span>
            </div>

            <div id="registered-activities" style="margin: 20px 0; padding: 15px; background: #F8F4FF; border-radius: 12px;">
                <strong>📋 Registered Activities:</strong>
                <div id="activities-list" style="margin-top: 10px;">
                    <span style="color: #888;">No activities registered yet.</span>
                </div>
            </div>

            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
                <button class="btn-primary" onclick="window.location.href='quiz.html'">📝 Take Quiz</button>
                <button class="btn-secondary" onclick="window.location.href='activities.html'">🎯 Find Activities</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, 
            db, 
            onAuthStateChanged, 
            signOut,
            doc,
            getDoc,
            collection,
            getDocs,
            query,
            where
        } from './js/firebase-config.js';

        async function loadDashboard(user) {
            try {
                // Get student data
                const studentDoc = await getDoc(doc(db, 'students', user.uid));
                let studentData = {};
                
                if (studentDoc.exists()) {
                    studentData = studentDoc.data();
                    document.getElementById('welcome-text').textContent = `Hello, ${studentData.name || 'Student'}! 👋`;
                } else {
                    // Create student profile if missing
                    await setDoc(doc(db, 'students', user.uid), {
                        uid: user.uid,
                        name: user.email.split('@')[0],
                        email: user.email,
                        createdAt: new Date().toISOString()
                    });
                    document.getElementById('welcome-text').textContent = `Hello, ${user.email.split('@')[0]}! 👋`;
                }
                
                document.getElementById('user-email').textContent = `📧 ${user.email}`;
                
                // Profile strength
                const strength = studentData.profileStrength || 0;
                document.getElementById('profile-strength').textContent = strength + '%';
                
                // Activity count
                const registered = studentData.registered_activities || [];
                document.getElementById('activity-count').textContent = registered.length;
                
                // Quiz status
                document.getElementById('quiz-status').textContent = studentData.profileCompleted ? '✅ Done' : '⏳ Pending';
                
                // Phase
                document.getElementById('phase').textContent = studentData.onboardingPhase || 1;
                
                // Interests
                const interests = studentData.interests || [];
                document.getElementById('interests-list').innerHTML = interests.length > 0 
                    ? interests.map(tag => `<span class="interests-tag">${tag}</span>`).join('')
                    : 'Not set';
                
                // Registered Activities - Fetch actual activity names
                if (registered.length > 0) {
                    const activitiesList = document.getElementById('activities-list');
                    activitiesList.innerHTML = '';
                    
                    for (const activityId of registered) {
                        try {
                            const activityDoc = await getDoc(doc(db, 'activities', activityId));
                            if (activityDoc.exists()) {
                                const actData = activityDoc.data();
                                const div = document.createElement('div');
                                div.className = 'registered-activity-item';
                                div.innerHTML = `
                                    <span>${actData.name || activityId}</span>
                                    <span style="font-size: 12px; color: #6C3CE1; font-weight: 600;">✅ Registered</span>
                                `;
                                activitiesList.appendChild(div);
                            }
                        } catch (e) {
                            console.error('Error fetching activity:', e);
                        }
                    }
                }
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // Auth state listener
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            await loadDashboard(user);
        });

        // Logout function
        window.logoutUser = async function() {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
            }
        };
    </script>
</body>
</html>
