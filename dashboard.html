<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Futures Abroad</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            min-height: 100vh;
            background: #FFF8F0;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }
        .dashboard-header .logo {
            font-size: 24px;
            font-weight: 800;
            color: #2D1B4E;
        }
        .dashboard-header .logo span { color: #6C3CE1; }
        .dashboard-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .dashboard-content h1 {
            color: #2D1B4E;
            margin-bottom: 10px;
        }
        .dashboard-content p {
            color: #555;
            font-size: 17px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        .dashboard-card {
            background: #F8F4FF;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .dashboard-card .number {
            font-size: 32px;
            font-weight: 800;
            color: #6C3CE1;
        }
        .dashboard-card .label {
            color: #888;
            font-size: 14px;
        }
        .btn-logout {
            padding: 10px 24px;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-logout:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,107,107,0.3); }
        .btn-back {
            padding: 10px 24px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
        }
        .btn-back:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,60,225,0.3); }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="logo">🚀 Futures <span>Abroad</span></div>
            <div>
                <button class="btn-back" onclick="window.location.href='index.html'">← Back</button>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
        <div class="dashboard-content">
            <h1 id="welcome-text">Welcome!</h1>
            <p id="user-email">Loading...</p>
            
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <div class="number" id="profile-strength">0%</div>
                    <div class="label">📊 Profile Strength</div>
                </div>
                <div class="dashboard-card">
                    <div class="number" id="activity-count">0</div>
                    <div class="label">📋 Activities</div>
                </div>
                <div class="dashboard-card">
                    <div class="number" id="quiz-status">⏳</div>
                    <div class="label">🎯 Quiz Status</div>
                </div>
                <div class="dashboard-card">
                    <div class="number" id="phase">1</div>
                    <div class="label">🔄 Phase</div>
                </div>
            </div>

            <div id="user-interests" style="margin: 20px 0; padding: 15px; background: #F0E6FF; border-radius: 12px;">
                <strong>🎯 Your Interests:</strong> <span id="interests-list">Not set</span>
            </div>

            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-primary" onclick="window.location.href='quiz.html'">Take Quiz</button>
                <button class="btn-secondary" onclick="window.location.href='admin-login.html'">🔐 Admin</button>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        auth.onAuthStateChanged(async user => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            const doc = await db.collection('students').doc(user.uid).get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('welcome-text').textContent = `Hello, ${data.name || 'Student'}! 👋`;
                document.getElementById('user-email').textContent = `📧 ${user.email}`;
                document.getElementById('profile-strength').textContent = (data.profileStrength || 0) + '%';
                document.getElementById('activity-count').textContent = (data.activities || []).length;
                document.getElementById('phase').textContent = data.onboardingPhase || 1;
                document.getElementById('quiz-status').textContent = data.profileCompleted ? '✅ Done' : '⏳ Pending';
                document.getElementById('interests-list').textContent = (data.interests || []).join(', ') || 'Not set';
            }
        });

        function logout() {
            auth.signOut();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
