<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Futures Abroad</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .auth-container {
            max-width: 420px;
            margin: 60px auto;
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(108,60,225,0.12);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header .logo {
            font-size: 28px;
            font-weight: 800;
            color: #2D1B4E;
        }
        .auth-header .logo span { color: #6C3CE1; }
        .auth-header h1 {
            font-size: 24px;
            color: #2D1B4E;
            margin: 10px 0 5px;
        }
        .auth-header p {
            color: #888;
            font-size: 15px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #2D1B4E;
            font-size: 14px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E8E0F0;
            border-radius: 14px;
            font-size: 15px;
            font-family: 'Quicksand', sans-serif;
            transition: border 0.3s;
            background: #faf8ff;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #6C3CE1;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(108,60,225,0.08);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Quicksand', sans-serif;
            margin-top: 5px;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(108,60,225,0.35);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        .auth-footer a {
            color: #6C3CE1;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .message-box {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
        .message-box.error {
            display: block;
            background: #FFE8E8;
            color: #C62828;
            border-left: 4px solid #C62828;
        }
        .message-box.success {
            display: block;
            background: #E8F5E9;
            color: #2E7D32;
            border-left: 4px solid #2E7D32;
        }
        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .auth-container {
                margin: 20px 15px;
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">🚀 Futures <span>Abroad</span></div>
            <h1>Create Your Account</h1>
            <p>Start your university journey today</p>
        </div>
        
        <div id="signupMessage" class="message-box"></div>
        
        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="Your full name" required />
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" placeholder="student@email.com" required />
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Minimum 6 characters" required minlength="6" />
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Grade</label>
                    <select id="signup-grade" required>
                        <option value="">Select Grade</option>
                        <option value="10">Grade 10</option>
                        <option value="11">Grade 11</option>
                        <option value="12">Grade 12</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Country</label>
                    <select id="signup-country" required>
                        <option value="">Select Country</option>
                        <option value="UAE">UAE</option>
                        <option value="Saudi Arabia">Saudi Arabia</option>
                        <option value="Qatar">Qatar</option>
                        <option value="Kuwait">Kuwait</option>
                        <option value="Oman">Oman</option>
                        <option value="Bahrain">Bahrain</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>School Name</label>
                <input type="text" id="signup-school" placeholder="Your school name" />
            </div>
            
            <button type="submit" class="btn-submit">Create Account 🚀</button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Log In</a></p>
            <p style="margin-top:8px;"><a href="index.html">← Back to Home</a></p>
        </div>
    </div>

    <script type="module">
        // ============================================================
        // IMPORTS
        // ============================================================
        import { 
            auth, 
            db,
            doc,
            setDoc,
            createUserWithEmailAndPassword,
            serverTimestamp
        } from './js/firebase-config.js';

        // ============================================================
        // SIGNUP FORM
        // ============================================================
        document.getElementById('signup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const grade = document.getElementById('signup-grade').value;
            const country = document.getElementById('signup-country').value;
            const school = document.getElementById('signup-school').value.trim();
            
            const msgEl = document.getElementById('signupMessage');
            msgEl.className = 'message-box';
            msgEl.textContent = '';
            
            if (!name || !email || !password || !grade || !country) {
                msgEl.className = 'message-box error';
                msgEl.textContent = '⚠️ Please fill in all required fields.';
                return;
            }
            
            if (password.length < 6) {
                msgEl.className = 'message-box error';
                msgEl.textContent = '⚠️ Password must be at least 6 characters.';
                return;
            }
            
            try {
                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // ============================================================
                // SAVE STUDENT DATA TO FIRESTORE
                // ============================================================
                await setDoc(doc(db, 'students', user.uid), {
                    uid: user.uid,
                    name: name,
                    email: email,
                    grade: grade,
                    country: country,
                    school: school || 'Not specified',
                    interests: [],
                    selectedInterests: [], // For the 3 interests they choose
                    profileCompleted: false,
                    quizCompleted: false,
                    onboardingPhase: 1,
                    phase: 'Phase 1',
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });
                
                // Also save to studentProfiles for backup
                await setDoc(doc(db, 'studentProfiles', user.uid), {
                    name: name,
                    email: email,
                    grade: grade,
                    country: country,
                    school: school || 'Not specified',
                    createdAt: serverTimestamp()
                });
                
                console.log('✅ Student saved to Firestore!');
                console.log('📌 UID:', user.uid);
                console.log('📌 Name:', name);
                
                msgEl.className = 'message-box success';
                msgEl.textContent = '✅ Account created! Choose your interests...';
                
                // ============================================================
                // REDIRECT TO INTEREST SELECTION (NOT QUIZ YET)
                // ============================================================
                setTimeout(() => {
                    window.location.href = 'select-interests.html?uid=' + user.uid;
                }, 1500);
                
            } catch (error) {
                console.error('Signup error:', error);
                msgEl.className = 'message-box error';
                
                if (error.code === 'auth/email-already-in-use') {
                    msgEl.textContent = '❌ This email is already registered. Please login instead.';
                } else if (error.code === 'auth/invalid-email') {
                    msgEl.textContent = '❌ Invalid email address.';
                } else if (error.code === 'auth/weak-password') {
                    msgEl.textContent = '❌ Password is too weak. Please use at least 6 characters.';
                } else {
                    msgEl.textContent = '❌ Signup failed: ' + error.message;
                }
            }
        });
    </script>
</body>
</html>
