<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interest Quiz - Futures Abroad</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .quiz-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(108,60,225,0.12);
            min-height: 400px;
        }
        .quiz-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .quiz-header .logo {
            font-size: 28px;
            font-weight: 800;
            color: #2D1B4E;
        }
        .quiz-header .logo span { color: #6C3CE1; }
        .quiz-header h1 {
            font-size: 24px;
            color: #2D1B4E;
            margin: 10px 0 5px;
        }
        .quiz-header p {
            color: #888;
            font-size: 15px;
        }
        .selected-interests-display {
            background: #f8f4ff;
            border-radius: 12px;
            padding: 10px 16px;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid #f0e6ff;
        }
        .selected-interests-display .tag {
            display: inline-block;
            padding: 4px 14px;
            background: #6C3CE1;
            color: white;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            margin: 3px;
        }
        .question-container {
            margin-bottom: 25px;
        }
        .question-container .question-number {
            font-size: 14px;
            color: #6C3CE1;
            font-weight: 700;
        }
        .question-container .question-text {
            font-size: 20px;
            font-weight: 700;
            color: #2D1B4E;
            margin: 10px 0 15px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .options button {
            padding: 14px 20px;
            border: 2px solid #E8E0F0;
            border-radius: 14px;
            background: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Quicksand', sans-serif;
            text-align: left;
            color: #2D1B4E;
        }
        .options button:hover {
            border-color: #6C3CE1;
            background: #f8f4ff;
            transform: translateX(5px);
        }
        .options button.selected {
            border-color: #6C3CE1;
            background: #6C3CE1;
            color: white;
        }
        .quiz-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0e6ff;
        }
        .progress-bar {
            flex: 1;
            height: 8px;
            background: #f0e6ff;
            border-radius: 10px;
            margin: 0 20px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #6C3CE1;
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }
        .btn-next {
            padding: 12px 30px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
        }
        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(108,60,225,0.3);
        }
        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .result-container {
            text-align: center;
            padding: 20px 0;
        }
        .result-container .interest-tag {
            display: inline-block;
            padding: 8px 20px;
            background: #f0e6ff;
            border-radius: 50px;
            margin: 5px;
            font-weight: 700;
            color: #6C3CE1;
            border: 2px solid #6C3CE1;
        }
        .btn-finish {
            padding: 14px 40px;
            background: #6C3CE1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .btn-finish:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(108,60,225,0.35);
        }
        .message-box {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
        .message-box.error {
            display: block;
            background: #FFE8E8;
            color: #C62828;
            border-left: 4px solid #C62828;
        }
        .message-box.success {
            display: block;
            background: #E8F5E9;
            color: #2E7D32;
            border-left: 4px solid #2E7D32;
        }
        @media (max-width: 500px) {
            .quiz-container {
                margin: 20px 15px;
                padding: 25px 20px;
            }
            .question-container .question-text {
                font-size: 17px;
            }
            .options button {
                font-size: 14px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container" id="quizContainer">
        <div class="quiz-header">
            <div class="logo">🧭 Futures <span>Abroad</span></div>
            <h1>Interest Discovery Quiz</h1>
            <p id="progressText">Question 1 of 8</p>
        </div>
        
        <!-- Show selected interests -->
        <div class="selected-interests-display" id="selectedDisplay">
            Your interests: <span id="selectedTags"></span>
        </div>
        
        <div id="messageBox" class="message-box"></div>
        
        <!-- Questions Area -->
        <div id="questionArea">
            <div class="question-container">
                <div class="question-number" id="questionNumber">Q1</div>
                <div class="question-text" id="questionText">Loading question...</div>
                <div class="options" id="optionsContainer"></div>
            </div>
            
            <div class="quiz-progress">
                <span id="questionCounter">1/8</span>
                <div class="progress-bar">
                    <div class="fill" id="progressFill"></div>
                </div>
                <button class="btn-next" id="nextBtn" disabled>Next →</button>
            </div>
        </div>
        
        <!-- Results Area -->
        <div id="resultArea" style="display:none;">
            <div class="result-container">
                <div style="font-size:48px;">🎉</div>
                <h2 style="color:#2D1B4E; margin:10px 0;">Your Interest Profile</h2>
                <p style="color:#666;">Based on your selected interests and quiz answers:</p>
                <div id="interestTags" style="margin:20px 0;"></div>
                <p style="color:#888; font-size:14px;">These tags will help us recommend the best activities for you.</p>
                <!-- ✅ UPDATED: Redirects to student-app.html (Phase 2) -->
                <button class="btn-finish" id="goToPhase2Btn">🚀 Go to Activities</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================================
        // IMPORTS
        // ============================================================
        import { 
            auth, 
            db,
            doc,
            getDoc,
            updateDoc,
            serverTimestamp
        } from './js/firebase-config.js';

        // ============================================================
        // QUIZ DATA (8 Questions)
        // ============================================================
        const questions = [
            {
                id: 1,
                text: "What subject do you look forward to most at school?",
                options: ["Biology / Life Sciences", "Chemistry", "Physics", "Mathematics", "Computer Science", "History / Social Studies", "Art / Design", "Business / Economics"]
            },
            {
                id: 2,
                text: "If you had a free weekend, what would you build or explore?",
                options: ["A science experiment", "A new app or website", "A piece of art or music", "A volunteer project", "A business idea", "A research paper", "A sports tournament", "A community event"]
            },
            {
                id: 3,
                text: "What kind of change do you want to see in the world?",
                options: ["Curing diseases", "Protecting the environment", "Advancing technology", "Promoting social justice", "Improving education", "Creating art that inspires", "Building stronger communities", "Driving economic growth"]
            },
            {
                id: 4,
                text: "What type of work environment excites you most?",
                options: ["A lab or research facility", "A tech startup", "A creative studio", "A non-profit organization", "A corporate office", "A hospital or clinic", "A school or university", "A government agency"]
            },
            {
                id: 5,
                text: "Which skill do you want to develop most?",
                options: ["Leadership", "Technical/Programming", "Creative/Design", "Communication", "Problem-solving", "Teamwork", "Analytical thinking", "Empathy and emotional intelligence"]
            },
            {
                id: 6,
                text: "What type of activity sounds most appealing to you?",
                options: ["Scientific research", "Competing in a challenge", "Volunteering for a cause", "Building a project", "Leading a team", "Creating content", "Learning a new skill", "Networking with professionals"]
            },
            {
                id: 7,
                text: "Where do you see yourself in 10 years?",
                options: ["As a doctor or healthcare professional", "As an engineer or scientist", "As an entrepreneur or business leader", "As an artist or designer", "As a teacher or professor", "As a lawyer or policymaker", "As a tech innovator", "As a community leader"]
            },
            {
                id: 8,
                text: "What's most important to you in a future career?",
                options: ["Helping others", "Financial success", "Making a global impact", "Creative freedom", "Intellectual challenge", "Work-life balance", "Job security", "Continuous learning"]
            }
        ];

        // ============================================================
        // MAP OPTIONS TO INTEREST TAGS
        // ============================================================
        const tagMapping = {
            "Biology / Life Sciences": ["Medicine", "Biology"],
            "Chemistry": ["Chemistry", "STEM"],
            "Physics": ["Physics", "STEM"],
            "Mathematics": ["Mathematics", "STEM"],
            "Computer Science": ["Computer Science", "Technology"],
            "History / Social Studies": ["Humanities", "Social Sciences"],
            "Art / Design": ["Arts & Design"],
            "Business / Economics": ["Business", "Finance"],
            "A science experiment": ["STEM", "Research"],
            "A new app or website": ["Technology", "App Development"],
            "A piece of art or music": ["Arts & Design", "Music"],
            "A volunteer project": ["Community Service", "Leadership"],
            "A business idea": ["Entrepreneurship", "Business"],
            "A research paper": ["Research", "STEM"],
            "A sports tournament": ["Sports Science", "Leadership"],
            "A community event": ["Community Service", "Social Enterprise"],
            "Curing diseases": ["Medicine", "Public Health"],
            "Protecting the environment": ["Environment", "Sustainability"],
            "Advancing technology": ["Technology", "AI & Machine Learning"],
            "Promoting social justice": ["Social Sciences", "International Relations"],
            "Improving education": ["Education", "Social Enterprise"],
            "Creating art that inspires": ["Arts & Design", "Visual Art"],
            "Building stronger communities": ["Community Service", "Social Enterprise"],
            "Driving economic growth": ["Economics", "Business"],
            "A lab or research facility": ["STEM", "Research"],
            "A tech startup": ["Technology", "Entrepreneurship"],
            "A creative studio": ["Arts & Design", "Graphic Design"],
            "A non-profit organization": ["Non-Profit", "Social Enterprise"],
            "A corporate office": ["Business", "Management"],
            "A hospital or clinic": ["Medicine", "Public Health"],
            "A school or university": ["Education", "Social Sciences"],
            "A government agency": ["Political Science", "International Relations"],
            "Leadership": ["Leadership", "Management"],
            "Technical/Programming": ["Technology", "Computer Science"],
            "Creative/Design": ["Arts & Design", "Graphic Design"],
            "Communication": ["Communications", "Marketing"],
            "Problem-solving": ["STEM", "Engineering"],
            "Teamwork": ["Leadership", "Management"],
            "Analytical thinking": ["STEM", "Data Science"],
            "Empathy and emotional intelligence": ["Psychology", "Social Sciences"],
            "Scientific research": ["STEM", "Research"],
            "Competing in a challenge": ["Competition", "STEM"],
            "Volunteering for a cause": ["Community Service", "Leadership"],
            "Building a project": ["Entrepreneurship", "Technology"],
            "Leading a team": ["Leadership", "Management"],
            "Creating content": ["Arts & Design", "Media"],
            "Learning a new skill": ["Education", "Personal Development"],
            "Networking with professionals": ["Business", "Leadership"],
            "As a doctor or healthcare professional": ["Medicine", "Public Health"],
            "As an engineer or scientist": ["STEM", "Engineering"],
            "As an entrepreneur or business leader": ["Entrepreneurship", "Business"],
            "As an artist or designer": ["Arts & Design", "Visual Art"],
            "As a teacher or professor": ["Education", "Social Sciences"],
            "As a lawyer or policymaker": ["Law", "Political Science"],
            "As a tech innovator": ["Technology", "AI & Machine Learning"],
            "As a community leader": ["Community Service", "Leadership"],
            "Helping others": ["Community Service", "Medicine"],
            "Financial success": ["Business", "Finance"],
            "Making a global impact": ["International Relations", "Social Enterprise"],
            "Creative freedom": ["Arts & Design", "Creative"],
            "Intellectual challenge": ["STEM", "Research"],
            "Work-life balance": ["Personal Development", "Health"],
            "Job security": ["Business", "Finance"],
            "Continuous learning": ["Education", "STEM"]
        };

        // ============================================================
        // QUIZ STATE
        // ============================================================
        let currentQuestion = 0;
        let selectedAnswers = [];
        let userInterests = [];
        let currentUid = null;
        let selectedInterests = [];

        // Get UID from URL
        const urlParams = new URLSearchParams(window.location.search);
        currentUid = urlParams.get('uid');

        // ============================================================
        // LOAD SELECTED INTERESTS
        // ============================================================
        async function loadSelectedInterests() {
            // First try to get from localStorage
            const localUser = localStorage.getItem('futuresAbroadUser');
            if (localUser) {
                try {
                    const userData = JSON.parse(localUser);
                    if (userData.interests && userData.interests.length > 0) {
                        selectedInterests = userData.interests;
                        // Display them
                        const tagsContainer = document.getElementById('selectedTags');
                        tagsContainer.innerHTML = '';
                        selectedInterests.forEach(interest => {
                            const span = document.createElement('span');
                            span.className = 'tag';
                            span.textContent = interest;
                            tagsContainer.appendChild(span);
                        });
                        // Add to userInterests
                        selectedInterests.forEach(interest => {
                            if (!userInterests.includes(interest)) {
                                userInterests.push(interest);
                            }
                        });
                        console.log('✅ Loaded interests from localStorage:', selectedInterests);
                        return;
                    }
                } catch (e) {
                    console.error('Error parsing localStorage:', e);
                }
            }

            // If not in localStorage, try Firestore
            if (!currentUid) return;
            
            try {
                const docRef = doc(db, 'students', currentUid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    selectedInterests = data.selectedInterests || [];
                    
                    // Display them
                    const tagsContainer = document.getElementById('selectedTags');
                    tagsContainer.innerHTML = '';
                    selectedInterests.forEach(interest => {
                        const span = document.createElement('span');
                        span.className = 'tag';
                        span.textContent = interest;
                        tagsContainer.appendChild(span);
                    });
                    
                    // Add to userInterests
                    selectedInterests.forEach(interest => {
                        if (!userInterests.includes(interest)) {
                            userInterests.push(interest);
                        }
                    });
                    
                    console.log('✅ Loaded selected interests from Firestore:', selectedInterests);
                }
            } catch (error) {
                console.error('Error loading interests:', error);
            }
        }

        // ============================================================
        // RENDER QUESTION
        // ============================================================
        function renderQuestion() {
            if (currentQuestion >= questions.length) {
                showResults();
                return;
            }

            const q = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = `Q${q.id}`;
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('questionCounter').textContent = `${currentQuestion + 1}/${questions.length}`;
            document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.textContent = option;
                btn.dataset.index = index;
                btn.onclick = function() {
                    selectOption(index);
                };
                optionsContainer.appendChild(btn);
            });

            const nextBtn = document.getElementById('nextBtn');
            nextBtn.disabled = true;
            nextBtn.textContent = currentQuestion === questions.length - 1 ? 'Finish →' : 'Next →';
            
            document.querySelectorAll('.options button').forEach(btn => {
                btn.classList.remove('selected');
            });
            
            if (selectedAnswers[currentQuestion] !== undefined) {
                const btns = document.querySelectorAll('.options button');
                btns.forEach((btn, idx) => {
                    if (idx === selectedAnswers[currentQuestion]) {
                        btn.classList.add('selected');
                    }
                });
                nextBtn.disabled = false;
            }
        }

        // ============================================================
        // SELECT OPTION
        // ============================================================
        function selectOption(index) {
            selectedAnswers[currentQuestion] = index;
            
            document.querySelectorAll('.options button').forEach((btn, idx) => {
                btn.classList.toggle('selected', idx === index);
            });
            
            document.getElementById('nextBtn').disabled = false;
        }

        // ============================================================
        // NEXT QUESTION
        // ============================================================
        document.getElementById('nextBtn').addEventListener('click', function() {
            if (this.disabled) return;
            
            const q = questions[currentQuestion];
            const selectedIndex = selectedAnswers[currentQuestion];
            const selectedText = q.options[selectedIndex];
            
            const tags = tagMapping[selectedText] || [];
            tags.forEach(tag => {
                if (!userInterests.includes(tag)) {
                    userInterests.push(tag);
                }
            });
            
            currentQuestion++;
            
            if (currentQuestion >= questions.length) {
                showResults();
            } else {
                renderQuestion();
            }
        });

        // ============================================================
        // SHOW RESULTS
        // ============================================================
        async function showResults() {
            document.getElementById('questionArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('progressText').textContent = 'Quiz Complete! 🎉';
            
            // Count frequency of each interest
            const interestCount = {};
            userInterests.forEach(tag => {
                interestCount[tag] = (interestCount[tag] || 0) + 1;
            });
            
            // Sort by frequency and get top 4
            const sortedInterests = Object.entries(interestCount)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 4)
                .map(item => item[0]);
            
            // Display tags
            const tagsContainer = document.getElementById('interestTags');
            tagsContainer.innerHTML = '';
            sortedInterests.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'interest-tag';
                span.textContent = tag;
                tagsContainer.appendChild(span);
            });
            
            // Update localStorage
            const localUser = localStorage.getItem('futuresAbroadUser');
            if (localUser) {
                try {
                    const userData = JSON.parse(localUser);
                    userData.interests = sortedInterests;
                    userData.quizCompleted = true;
                    userData.phase = 2;
                    localStorage.setItem('futuresAbroadUser', JSON.stringify(userData));
                    console.log('✅ Updated localStorage with quiz results:', sortedInterests);
                } catch (e) {
                    console.error('Error updating localStorage:', e);
                }
            }
            
            // Save to Firestore
            if (currentUid) {
                try {
                    await updateDoc(doc(db, 'students', currentUid), {
                        interests: sortedInterests,
                        profileCompleted: true,
                        quizCompleted: true,
                        quizCompletedAt: serverTimestamp(),
                        phase: 'Phase 2'
                    });
                    console.log('✅ Quiz results saved to Firestore!');
                } catch (error) {
                    console.error('Error saving quiz:', error);
                }
            }
        }

        // ============================================================
        // GO TO PHASE 2 - ACTIVITIES (student-app.html)
        // ============================================================
        document.getElementById('goToPhase2Btn').addEventListener('click', function() {
            window.location.href = 'student-app.html';
        });

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            // First try to get user from localStorage
            const localUser = localStorage.getItem('futuresAbroadUser');
            if (localUser) {
                try {
                    const userData = JSON.parse(localUser);
                    if (userData.uid) {
                        currentUid = userData.uid;
                    }
                } catch (e) {}
            }

            // If no UID, try to get from auth
            if (!currentUid) {
                const user = auth.currentUser;
                if (user) {
                    currentUid = user.uid;
                } else {
                    auth.onAuthStateChanged(user => {
                        if (user) {
                            currentUid = user.uid;
                            loadSelectedInterests();
                            renderQuestion();
                        } else {
                            document.getElementById('messageBox').className = 'message-box error';
                            document.getElementById('messageBox').textContent = '⚠️ Please login to continue.';
                        }
                    });
                    return;
                }
            }
            
            await loadSelectedInterests();
            renderQuestion();
        }

        init();
        console.log('✅ Quiz loaded!');
    </script>
</body>
</html>
